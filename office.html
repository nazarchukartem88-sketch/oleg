<!doctype html><html lang="uk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Керування сайтом</title><style>
:root{--dark:#10140f;--green:#173628;--gold:#c99c4a;--bg:#f3f1eb;--line:#dedbd2}*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial;background:var(--bg);color:var(--dark)}button,input,textarea,select{font:inherit}.login{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#224c39,#0c120e)}.card{background:#fff;border-radius:24px;padding:30px;width:min(430px,92vw);box-shadow:0 20px 60px #0004}.card h1{font:700 38px Georgia;margin:10px 0}.field{display:grid;gap:6px;margin:14px 0}.field input,.field textarea,.field select{padding:12px;border:1px solid var(--line);border-radius:12px}.btn{border:0;border-radius:12px;padding:13px 16px;background:var(--green);color:#fff;font-weight:800;cursor:pointer}.error{color:#a22;font-size:13px}.app{display:none}.top{background:var(--dark);color:#fff;padding:16px 4vw;display:flex;justify-content:space-between}.wrap{width:min(1200px,92vw);margin:25px auto}.tabs{display:flex;gap:8px;margin-bottom:18px}.tabs button{background:#fff;border:1px solid var(--line);padding:10px 14px;border-radius:999px}.tabs button.active{background:var(--green);color:#fff}.panel{display:none}.panel.active{display:block}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.stat,.box{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px}.list{display:grid;gap:12px;margin-top:16px}.row{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;display:grid;gap:8px}.row small{color:#69706a}.actions{display:flex;gap:8px;flex-wrap:wrap}.actions button{padding:8px 10px;border-radius:9px;border:1px solid var(--line);background:#fff}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:700px){.stats,.grid{grid-template-columns:1fr}}
</style></head><body>
<section class="login" id="login"><form class="card" id="loginForm"><a href="/">← На сайт</a><h1>Захищений вхід</h1><label class="field">Email<input name="email" type="email" value="admin@oleg-realtor.com" required></label><label class="field">Пароль<input name="password" type="password" required></label><button class="btn">Увійти</button><p class="error" id="loginError"></p></form></section>
<section class="app" id="app"><header class="top"><strong>Керування сайтом</strong><button class="btn" id="logout">Вийти</button></header><main class="wrap"><div class="tabs"><button class="active" data-tab="overview">Огляд</button><button data-tab="leads">Заявки</button><button data-tab="properties">Об’єкти</button></div>
<section class="panel active" id="overview"><div class="stats"><div class="stat"><h2 id="leadCount">0</h2><span>заявок</span></div><div class="stat"><h2 id="newCount">0</h2><span>нових</span></div><div class="stat"><h2 id="propCount">0</h2><span>об’єктів</span></div></div></section>
<section class="panel" id="leads"><h1>Заявки</h1><div class="list" id="leadList"></div></section>
<section class="panel" id="properties"><div class="box"><h1>Додати об’єкт</h1><form id="propertyForm"><div class="grid"><label class="field">Назва<input name="title" required></label><label class="field">Тип<select name="type"><option value="apartment">Квартира</option><option value="house">Будинок</option><option value="commercial">Комерція</option></select></label><label class="field">Район<input name="district" required></label><label class="field">Ціна, $<input name="price" type="number"></label><label class="field">Площа, м²<input name="area" type="number"></label><label class="field">Кімнат<input name="rooms" type="number"></label></div><label class="field">Опис<textarea name="description" required></textarea></label><label class="field">Посилання на відео<input name="video_url"></label><label class="field">Фото до 5 МБ<input name="images" type="file" accept="image/jpeg,image/png,image/webp" multiple></label><label><input name="published" type="checkbox" checked> Опублікувати</label><br><br><button class="btn">Зберегти</button><span id="propStatus"></span></form></div><h2>Об’єкти</h2><div class="list" id="propertyList"></div></section>
</main></section><script src="admin-app.js"></script></body></html>
