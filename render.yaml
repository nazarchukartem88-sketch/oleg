services:
  - type: web
    name: oleg-realtor-site
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev --no-audit --no-fund
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: oleg-realtor-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: oleg-realtor-db
    plan: free
    databaseName: oleg_realtor
    user: oleg_realtor
